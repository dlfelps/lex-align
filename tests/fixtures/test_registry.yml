version: "1.2"

global_policies:
  auto_approve_licenses: [MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC]
  hard_ban_licenses: [AGPL-3.0, GPL-3.0, GPL-2.0, LGPL-3.0, LGPL-2.1]
  require_human_review_licenses: [MPL-2.0, EPL-2.0]
  unknown_license_policy: block
  cve_threshold: 0.9

packages:
  httpx:
    status: preferred
    reason: Standard async HTTP client.
  fastapi:
    status: preferred
    reason: Project-wide web framework.
  pydantic:
    status: preferred
    reason: Validated data models across services.
  requests:
    status: deprecated
    replacement: httpx
    reason: Migrating all services to async patterns.
  urllib3:
    status: approved
    reason: Allowed as a transitive dependency only.
  cryptography:
    status: version-constrained
    min_version: "42.0.0"
    reason: CVE-2023-50782 affects earlier versions.
  django:
    status: version-constrained
    min_version: "4.2.0"
    max_version: "5.99.0"
    reason: Pinned to LTS-supported majors.
  pyqt5:
    status: banned
    reason: GPL-licensed; no commercial license held.
  left-pad:
    status: banned
    reason: Trivial functionality; do not pull from npm-style micro-deps.
