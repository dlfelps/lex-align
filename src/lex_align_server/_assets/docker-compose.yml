services:
  lexalign-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: lexalign-server:{LEX_ALIGN_VERSION}
    # Single-user mode default: bind to 127.0.0.1 only. Override the port
    # mapping (and set AUTH_ENABLED=true in env) for organization deployments.
    ports:
      - "127.0.0.1:8765:8765"
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_PATH: "/var/lib/lexalign/lexalign.sqlite"
      REGISTRY_PATH: "/etc/lexalign/registry.json"
    volumes:
      - lexalign-data:/var/lib/lexalign
      - ./registry.json:/etc/lexalign/registry.json:ro
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # RDB snapshots persisted to a named volume so the license/CVE cache
    # survives container restarts. AOF is intentionally omitted — this is
    # a cache and rebuilds itself from PyPI/OSV on miss.
    command:
      - redis-server
      - --save
      - "3600 1 300 100 60 10000"
      - --dir
      - /data
    volumes:
      - lexalign-redis:/data
    # No host port — Redis is internal to the compose network.
    expose:
      - "6379"

volumes:
  lexalign-data:
  lexalign-redis:
