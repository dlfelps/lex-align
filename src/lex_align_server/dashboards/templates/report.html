<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
  pre  { background: #f4f4f4; padding: 1rem; overflow-x: auto; }
  label { display: inline-block; margin-right: 0.5rem; }
</style>
</head>
<body>
<h1>{{ title }}</h1>
<p>Read-only view of <code>{{ endpoint }}</code>. Filter by project below.</p>

<form id="filter">
  <label>Project: <input type="text" name="project" /></label>
  <button type="submit">Reload</button>
</form>

<pre id="out">Loading…</pre>

<script>
async function load() {
  const params = new URLSearchParams(new FormData(document.getElementById('filter')));
  const url = "{{ endpoint }}" + (params.toString() ? "?" + params : "");
  const r = await fetch(url);
  document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
}
document.getElementById('filter').addEventListener('submit', e => { e.preventDefault(); load(); });
load();
</script>
</body>
</html>
