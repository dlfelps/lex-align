<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<style>
  :root {
    --border: #e3e3e3;
    --bg: #fafafa;
    --muted: #666;
    --c-allowed:     #0a8a6f;
    --c-provisional: #b97f00;
    --c-denied:      #b00;
  }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 1200px;
    margin: 1.5rem auto;
    padding: 0 1rem;
    color: #222;
  }
  h1 { margin-bottom: 0.25rem; }
  h2 { margin-top: 2rem; }
  .subtitle { color: var(--muted); margin-top: 0; }
  form#filter {
    display: flex; gap: 0.5rem; align-items: center;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.6rem; margin: 1rem 0;
  }
  input[type=text] { padding: 0.35rem 0.5rem; }
  button {
    background: #fff; border: 1px solid #bbb; border-radius: 4px;
    padding: 0.35rem 0.7rem; cursor: pointer; font: inherit;
  }
  button:hover { background: #f0f0f0; }
  .kpi-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0.75rem; margin: 0.5rem 0 1rem;
  }
  @media (max-width: 720px) { .kpi-row { grid-template-columns: 1fr 1fr; } }
  .kpi {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 0.9rem;
  }
  .kpi .label { color: var(--muted); font-size: 0.85rem; }
  .kpi .value { font-size: 1.6rem; font-weight: 600; }
  .kpi.bad .value { color: var(--c-denied); }
  .kpi.warn .value { color: var(--c-provisional); }
  .kpi.good .value { color: var(--c-allowed); }
  table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
  th, td {
    text-align: left; padding: 0.4rem 0.6rem;
    border-bottom: 1px solid var(--border); vertical-align: top;
  }
  th { background: var(--bg); }
  tr:hover td { background: #fcfcfc; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .verdict-DENIED               { color: var(--c-denied); font-weight: 600; }
  .verdict-PROVISIONALLY_ALLOWED{ color: var(--c-provisional); font-weight: 600; }
  .verdict-ALLOWED              { color: var(--c-allowed); }
  .agent {
    display: inline-block; padding: 0.05rem 0.4rem; border-radius: 3px;
    background: #eef2ff; color: #3730a3; font-size: 0.8rem;
    font-family: ui-monospace, monospace;
  }
  .agent.unknown { background: #f3f4f6; color: #6b7280; }
  .stack-bar {
    display: flex; height: 14px; border-radius: 3px; overflow: hidden;
    background: #eee; min-width: 8rem;
  }
  .stack-bar > span { display: block; height: 100%; }
  .stack-bar .a { background: var(--c-allowed); }
  .stack-bar .p { background: var(--c-provisional); }
  .stack-bar .d { background: var(--c-denied); }
  .legend {
    font-size: 0.8rem; color: var(--muted);
    display: flex; gap: 0.9rem; margin: 0.3rem 0 0.6rem;
  }
  .legend .swatch {
    display: inline-block; width: 0.7rem; height: 0.7rem;
    border-radius: 2px; margin-right: 0.3rem; vertical-align: middle;
  }
  .legend .a { background: var(--c-allowed); }
  .legend .p { background: var(--c-provisional); }
  .legend .d { background: var(--c-denied); }
  pre.raw {
    background: #f4f4f4; padding: 0.75rem; border-radius: 4px;
    overflow-x: auto; font-size: 0.8rem; max-height: 18rem;
  }
  details > summary { cursor: pointer; color: var(--muted); font-size: 0.9rem; }
  .ts { white-space: nowrap; color: var(--muted); font-size: 0.85rem; }
  .empty { padding: 1.5rem; text-align: center; color: var(--muted); }
  .license-tag {
    display: inline-block; padding: 0.05rem 0.45rem; border-radius: 3px;
    font-size: 0.8rem; font-family: ui-monospace, monospace;
    background: #f1f5f9; color: #0f172a;
  }
  .license-tag.unknown { background: #fef3c7; color: #92400e; }
  .license-tag.copyleft { background: #fee2e2; color: #991b1b; }
  .license-tag.permissive { background: #dcfce7; color: #166534; }
  .grid-2 {
    display: grid; grid-template-columns: 2fr 1fr; gap: 1rem;
  }
  @media (max-width: 720px) { .grid-2 { grid-template-columns: 1fr; } }
  .panel {
    border: 1px solid var(--border); border-radius: 6px; padding: 0.7rem 0.9rem;
  }
  .panel h3 { margin: 0 0 0.5rem; font-size: 1rem; }
</style>
</head>
<body>
<h1>{{ title }}</h1>
<p class="subtitle">
  License-compliance posture, from <code>{{ endpoint }}</code>. Edit the
  policy itself in the <a href="/dashboard/registry">registry workshop</a>.
</p>

<form id="filter">
  <label>Project: <input type="text" name="project" placeholder="(all projects)"></label>
  <button type="submit">Reload</button>
</form>

<div id="content">Loading…</div>

<script>
const ENDPOINT = "{{ endpoint }}";

const COPYLEFT = new Set([
  "GPL-2.0", "GPL-3.0", "AGPL-3.0", "LGPL-2.1", "LGPL-3.0",
]);
const PERMISSIVE = new Set([
  "MIT", "Apache-2.0", "BSD", "BSD-2-Clause", "BSD-3-Clause", "ISC",
  "Unlicense", "CC0-1.0",
]);

function fmtTs(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toISOString().replace("T", " ").slice(0, 19) + " UTC";
  } catch { return iso; }
}

function escape(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function agentBadge(model, version) {
  if (!model && !version) return '<span class="agent unknown">unknown</span>';
  const label = [model, version].filter(Boolean).join(" ");
  return `<span class="agent">${escape(label)}</span>`;
}

function licenseTag(name) {
  const u = String(name || "").toUpperCase();
  let cls = "";
  if (u === "UNKNOWN") cls = "unknown";
  else if (COPYLEFT.has(name)) cls = "copyleft";
  else if (PERMISSIVE.has(name)) cls = "permissive";
  return `<span class="license-tag ${cls}">${escape(name || "—")}</span>`;
}

function stackBar(allowed, provisional, denied) {
  const total = (allowed || 0) + (provisional || 0) + (denied || 0);
  if (total === 0) return "";
  const a = (100 * (allowed || 0) / total).toFixed(1);
  const p = (100 * (provisional || 0) / total).toFixed(1);
  const d = (100 * (denied || 0) / total).toFixed(1);
  return `<div class="stack-bar"
    title="${allowed} allowed · ${provisional} provisional · ${denied} denied">
    <span class="a" style="width:${a}%"></span>
    <span class="p" style="width:${p}%"></span>
    <span class="d" style="width:${d}%"></span>
  </div>`;
}

function renderKpis(data) {
  const totals = (data.license_breakdown || []).reduce((acc, r) => {
    acc.total += r.total || 0;
    acc.allowed += r.allowed || 0;
    acc.provisional += r.provisional || 0;
    acc.denied += r.denied || 0;
    return acc;
  }, { total: 0, allowed: 0, provisional: 0, denied: 0 });
  const u = data.unknown_license || {};
  const denials = data.total_denials || 0;
  const wrap = document.createElement("div");
  wrap.className = "kpi-row";
  wrap.innerHTML = `
    <div class="kpi"><div class="label">Evaluations with a license</div>
      <div class="value">${totals.total}</div></div>
    <div class="kpi bad"><div class="label">License-driven denials</div>
      <div class="value">${denials}</div></div>
    <div class="kpi warn"><div class="label">Unknown-license rows</div>
      <div class="value">${u.total || 0}</div></div>
    <div class="kpi"><div class="label">Distinct licenses seen</div>
      <div class="value">${(data.license_breakdown || []).length}</div></div>
  `;
  return wrap;
}

function renderLegend() {
  const el = document.createElement("div");
  el.className = "legend";
  el.innerHTML = `
    <span><span class="swatch a"></span>allowed</span>
    <span><span class="swatch p"></span>provisional</span>
    <span><span class="swatch d"></span>denied</span>
  `;
  return el;
}

function renderBreakdown(data) {
  const rows = data.license_breakdown || [];
  const c = document.createElement("section");
  c.innerHTML = `<h2>License breakdown</h2>`;
  c.appendChild(renderLegend());
  if (!rows.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No license data yet — make a few evaluations first.";
    c.appendChild(empty);
    return c;
  }
  const table = document.createElement("table");
  table.innerHTML = `
    <thead><tr>
      <th>License</th><th class="num">Total</th>
      <th>Verdict mix</th>
      <th class="num">Allowed</th><th class="num">Provisional</th><th class="num">Denied</th>
    </tr></thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector("tbody");
  for (const r of rows) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${licenseTag(r.license)}</td>
      <td class="num">${r.total || 0}</td>
      <td>${stackBar(r.allowed, r.provisional, r.denied)}</td>
      <td class="num">${r.allowed || 0}</td>
      <td class="num">${r.provisional || 0}</td>
      <td class="num">${r.denied || 0}</td>
    `;
    tbody.appendChild(tr);
  }
  c.appendChild(table);
  return c;
}

function renderSidePanels(data) {
  const wrap = document.createElement("div");
  wrap.className = "grid-2";

  const u = data.unknown_license || { total: 0, allowed: 0, provisional: 0, denied: 0 };
  const top = data.top_projects || [];

  const left = document.createElement("div");
  left.className = "panel";
  left.innerHTML = `
    <h3>Unknown-license policy</h3>
    <p style="color:var(--muted); font-size:0.85rem; margin:0 0 0.4rem;">
      How rows whose license normalised to <code>UNKNOWN</code> were
      classified. Tune <code>unknown_license_policy</code> if too many
      pass through provisionally.
    </p>
    <table>
      <thead><tr>
        <th class="num">Total</th><th class="num">Allowed</th>
        <th class="num">Provisional</th><th class="num">Denied</th>
      </tr></thead>
      <tbody><tr>
        <td class="num">${u.total || 0}</td>
        <td class="num">${u.allowed || 0}</td>
        <td class="num">${u.provisional || 0}</td>
        <td class="num">${u.denied || 0}</td>
      </tr></tbody>
    </table>
  `;
  wrap.appendChild(left);

  const right = document.createElement("div");
  right.className = "panel";
  right.innerHTML = `<h3>Top projects (license denials)</h3>`;
  if (!top.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No license-driven denials yet.";
    right.appendChild(empty);
  } else {
    const table = document.createElement("table");
    table.innerHTML = `
      <thead><tr><th>Project</th><th class="num">Denials</th></tr></thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector("tbody");
    for (const r of top) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${escape(r.project)}</td><td class="num">${r.denials}</td>`;
      tbody.appendChild(tr);
    }
    right.appendChild(table);
  }
  wrap.appendChild(right);
  return wrap;
}

function renderRecent(data) {
  const recent = data.recent || [];
  const c = document.createElement("section");
  c.innerHTML = `<h2>Most recent license denials (${recent.length})</h2>`;
  if (!recent.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No license denials recorded.";
    c.appendChild(empty);
    return c;
  }
  const table = document.createElement("table");
  table.innerHTML = `
    <thead><tr>
      <th>When</th><th>Project</th><th>Package</th>
      <th>License</th><th>Reason</th><th>Agent</th>
    </tr></thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector("tbody");
  for (const r of recent) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="ts">${escape(fmtTs(r.ts))}</td>
      <td>${escape(r.project)}</td>
      <td><strong>${escape(r.package)}</strong>${r.version ? " " + escape(r.version) : ""}</td>
      <td>${licenseTag(r.license)}</td>
      <td>${escape(r.reason || "")}</td>
      <td>${agentBadge(r.agent_model, r.agent_version)}</td>
    `;
    tbody.appendChild(tr);
  }
  c.appendChild(table);
  return c;
}

async function load() {
  const params = new URLSearchParams(new FormData(document.getElementById("filter")));
  const url = ENDPOINT + (params.toString() ? "?" + params : "");
  const r = await fetch(url);
  const data = await r.json();
  const target = document.getElementById("content");
  target.innerHTML = "";
  target.appendChild(renderKpis(data));
  target.appendChild(renderBreakdown(data));
  target.appendChild(renderSidePanels(data));
  target.appendChild(renderRecent(data));

  const raw = document.createElement("details");
  raw.innerHTML = `<summary>Raw JSON</summary>`;
  const pre = document.createElement("pre");
  pre.className = "raw";
  pre.textContent = JSON.stringify(data, null, 2);
  raw.appendChild(pre);
  target.appendChild(raw);
}
document.getElementById("filter").addEventListener("submit", e => { e.preventDefault(); load(); });
load();
</script>
</body>
</html>
